<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>About</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="sidebar.css">
    <link rel="stylesheet" href="cards.css">
    <link rel="stylesheet" href="responsive.css">
</head>

<script defer src="login.js"></script>

<body class="login-page">
    <div class="page">

        <div class="top">

                    </form>
                    <form action="/search.html" method="get">
                        <button type="submit" name="query" value="Behavioral Sciences and Leadership">Behavioral Sciences & Leadership</button>

                    <form action="/search.html" method="get">

                    </form>
                    <form action="/search.html" method="get">

                    </form>
                    <form action="/search.html" method="get">

                    <form action="/search.html" method="get">

                    </form>
                    <form action="/search.html" method="get">

                        <button type="submit" name="query" value="History">History</button>
                    </form>
                    <form action="/search.html" method="get">
                        <button type="submit" name="query" value="Languages and Cultures">Languages & Cultures</button>
                    </form>
                    <form action="/search.html" method="get">
                        <button type="submit" name="query" value="Law">Law</button>
                    </form>
                    <form action="/search.html" method="get">
                        <button type="submit" name="query" value="Management">Management</button>
                    </form>
                    <form action="/search.html" method="get">
                        <button type="submit" name="query" value="Mathematical Sciences">Mathematical Sciences</button>

                    </form>
                    <form action="/search.html" method="get">
                        <button type="submit" name="query" value="Physics and Meteorology">Physics & Meteorology</button>
                    </form>
                    <form action="/search.html" method="get">

                    </form>
                    <form action="/search.html" method="get">
                        <button type="submit" name="query" value="Systems Engineering">Systems Engineering</button>
                    </form>
                </div>
            </div>

            <!-- CENTER -->
            <div class="header-title">
                <h1>Login</h1>
            
                <form id="login-form" class="login" onsubmit="login(event)">
                    <label for="username">Username:</label>
                    <br>
                    <input type="text" id="username" name="username" placeholder="Enter username" required>
                    <br>
            
                    <label for="password">Password:</label>
                    <br>
                    <input type="password" id="password" name="password" placeholder="Enter password" required>
                    <br>
            
                    <button type="submit">Login</button>
                </form>
            
                <p>Need an account? <a href="register.html">Create one here</a></p>
            </div>

            <!-- RIGHT -->
            <div class="top-links">
                <img src="photos/user.png" alt="Default profile picture" class="contact-avatar">
                <div id="user-status"></div>
                <a href="about.html">About</a>
            </div>
        </div>

        <!-- FOOTER -->
        <div class="footer">
            <a href="contact.html">Contact Us</a>
        </div>

    </div>

<script defer src="loginStatus.js"></script>

</html>
