<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="sidebar.css">
    <link rel="stylesheet" href="cards.css">
    <link rel="stylesheet" href="responsive.css">
</head>

<body>
    <div class="page">

        <div class="top">

            <!-- SIDEBAR -->
            <div class="sidebar">
                <a href="index.html">
                    <img src="photos/AF.jpg" alt="USAFA Logo" class="logo">
                </a>

                <div class="departments">
                    <p class="departments-title">Departments</p>

                    <form action="/search" method="post">
                        <button type="submit" name="query" value="Aeronautics">Aeronautics</button>
                    </form>
                    <form action="/search" method="post">
                        <button type="submit" name="query" value="Astronautics">Astronautics</button>
                    </form>
                    <form action="/search" method="post">
                        <button type="submit" name="query" value="Computer and Cyber Sciences">Computer & Cyber Sciences</button>
                    </form>
                    <!-- you can keep or shorten this list -->
                </div>
            </div>

            <!-- CENTER (THIS IS YOUR OLD WORKING FORM) -->
            <div class="header-title">
                <h1>Register</h1>

                <!-- KEEP THIS EXACTLY -->
                <form id="register-form" onsubmit="register(event)">
                    <fieldset>
                        <legend>Register</legend>

                        <label for="name">Username:</label>
                        <input type="text" id="name" name="username" required>
                        <br>

                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" required>
                        <br>

                        <label for="password">Password:</label>
                        <input type="password" id="password" name="password" required>
                        <br>

                        <label for="role">Role:</label>
                        <select id="role" name="role" required>
                            <option value="user">User</option>
                            <option value="admin">Admin</option>
                        </select>
                        <br><br>

                        <button type="submit">Register</button>
                    </fieldset>
                </form>
            </div>

            <!-- TOP RIGHT -->
            <div class="top-links">
                <div id="user-status"></div>
                <span>|</span>
                <a href="about.html">About</a>
                <img src="photos/user.png" class="contact-avatar">
            </div>

        </div>

        <!-- FOOTER -->
        <div class="footer">
            <a href="contact.html">Contact Us</a>
        </div>

    </div>

    <!-- SCRIPTS -->
    <script defer src="loginStatus.js"></script>
    <script defer src="register.js"></script>

</body>
</html>
