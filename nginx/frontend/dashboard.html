<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <script defer src="dashboard.js"></script>
    <script defer src="loadnavbar.js"> </script>
    <link rel="stylesheet" href="website.css">
    <script defer src="loginstatus.js"> </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="sidebar.css">
    <link rel="stylesheet" href="cards.css">
    <link rel="stylesheet" href="responsive.css">
</head>

<body>
    <nav class="navbar"> <div id="navbar-placeholder"> nav bar placeholder </div> </nav>
    <h2>Admin Dashboard</h2>
    <table border="1">
        <thead>
            <tr>
                <th>Course ID</th>
                <th>Course Code</th>
                <th>Course Name</th>
                <th>Department ID</th>
            </tr>
        </thead>
        <tbody id="course-table-body">

        </tbody>
    </table>

    <div class="header-title">

        <!-- KEEP THIS EXACTLY -->
        <form id="insert-course" onsubmit="insertCourse(event)">
            <fieldset>
                <legend>Insert new course</legend>

                <label for="course_id">Course ID:</label>
                <input type="number" id="course_id" name="course_id" required>
                <br>

                <label for="course_code">Course Code:</label>
                <input type="text" id="course_code" name="course_code" required>
                <br>

                <label for="course_name">Course Name:</label>
                <input type="text" id="course_name" name="course_name" required>
                <br>

                <label for="d_id">Department ID:</label>
                <input type="number" id="d_id" name="d_id" required>
                <br>


                <button type="submit">Insert</button>
            </fieldset>
        </form>

        <form id="row-limit" onsubmit="displayRows(event)">
            <fieldset>
                <legend>Display Rows</legend>
                <label for="row_limit">Rows to Display:</label>
                <input type="number" id="row_limit" name="row_limit" placeholder="10" required>
                <br>
                <button type="submit">Display</button>
            </fieldset>
        </form>

        <form id="truncate" onsubmit="truncateTable(event)">
            <fieldset>
                <legend>Truncate Table</legend>
                <p>WARNING! This action can not be undone!</p>
                <button type="submit">Truncate</button>
            </fieldset>
        </form>
    </div>
</body>
</html>
