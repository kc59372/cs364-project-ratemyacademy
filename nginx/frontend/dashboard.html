<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <script defer src="dashboard.js"></script>
    <script defer src="loadnavbar.js"> </script>
    <script defer src="loginStatus.js"> </script>
    <script defer src="register.js"></script>
    <link rel="stylesheet" href="website.css">
</head>

<body>
    <nav class="navbar"> <div id="navbar-placeholder"> nav bar placeholder </div> </nav>
    <h2>Admin Dashboard</h2>

    <p> example of what admin dashboard could look like </p>
    <table border="1">
        <thead>
            <tr>
                <th>Username</th>
                <th>Email</th>
                <th>Role</th>
            </tr>
        </thead>
        <tbody id="userList"></tbody>
    </table>

    <div class="header-title">

        <!-- KEEP THIS EXACTLY -->
        <form id="register-form" onsubmit="register(event)">
            <fieldset>
                <legend>Insert new user</legend>

                <label for="name">Username:</label>
                <input type="text" id="name" name="username" required>
                <br>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                <br>

                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
                <br>

                <label for="role">Role:</label>
                <select id="role" name="role" required>
                    <option value="user">User</option>
                    <option value="admin">Admin</option>
                </select>
                <br><br>

                <button type="submit">Register</button>
            </fieldset>
        </form>
    </div>
</body>
</html>
