<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Write Review</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="sidebar.css">
    <link rel="stylesheet" href="cards.css">
    <link rel="stylesheet" href="responsive.css">
</head>

<body>
    <div class="page">

        <!-- TOP SECTION -->
        <div class="top">

            <!-- SIDEBAR -->
            <div class="sidebar">
                <a href="index.html">
                    <img src="photos/AF.jpg" alt="USAFA Logo" class="logo">
                </a>

                <div class="departments">
                    <p class="departments-title">Departments</p>
                
                    <form action="/search" method="post">
                        <button type="submit" name="query" value="Aeronautics">Aeronautics</button>
                    </form>
                    <form action="/search" method="post">
                        <button type="submit" name="query" value="Astronautics">Astronautics</button>
                    </form>
                    <form action="/search" method="post">
                        <button type="submit" name="query" value="Behavioral Sciences and Leadership">Behavioral Sciences & Leadership</button>
                    </form>
                    <form action="/search" method="post">
                        <button type="submit" name="query" value="Biology">Biology</button>
                    </form>
                    <form action="/search" method="post">
                        <button type="submit" name="query" value="Chemistry">Chemistry</button>
                    </form>
                    <form action="/search" method="post">
                        <button type="submit" name="query" value="Civil and Environmental Engineering">Civil & Environmental Engineering</button>
                    </form>
                    <form action="/search" method="post">
                        <button type="submit" name="query" value="Computer and Cyber Sciences">Computer & Cyber Sciences</button>
                    </form>
                    <form action="/search" method="post">
                        <button type="submit" name="query" value="Economics and Geosciences">Economics & Geosciences</button>
                    </form>
                    <form action="/search" method="post">
                        <button type="submit" name="query" value="Electrical and Computer Engineering">Electrical & Computer Engineering</button>
                    </form>
                    <form action="/search" method="post">
                        <button type="submit" name="query" value="English and Fine Arts">English & Fine Arts</button>
                    </form>
                    <form action="/search" method="post">
                        <button type="submit" name="query" value="History">History</button>
                    </form>
                    <form action="/search" method="post">
                        <button type="submit" name="query" value="Languages and Cultures">Languages & Cultures</button>
                    </form>
                    <form action="/search" method="post">
                        <button type="submit" name="query" value="Law">Law</button>
                    </form>
                    <form action="/search" method="post">
                        <button type="submit" name="query" value="Management">Management</button>
                    </form>
                    <form action="/search" method="post">
                        <button type="submit" name="query" value="Mathematical Sciences">Mathematical Sciences</button>
                    </form>
                    <form action="/search" method="post">
                        <button type="submit" name="query" value="Mechanical Engineering">Mechanical Engineering</button>
                    </form>
                    <form action="/search" method="post">
                        <button type="submit" name="query" value="Military and Strategic Studies">Military & Strategic Studies</button>
                    </form>
                    <form action="/search" method="post">
                        <button type="submit" name="query" value="Philosophy">Philosophy</button>
                    </form>
                    <form action="/search" method="post">
                        <button type="submit" name="query" value="Physics and Meteorology">Physics & Meteorology</button>
                    </form>
                    <form action="/search" method="post">
                        <button type="submit" name="query" value="Political Science">Political Science</button>
                    </form>
                    <form action="/search" method="post">
                        <button type="submit" name="query" value="Systems Engineering">Systems Engineering</button>
                    </form>
                </div>
                
            </div>

            <!-- CENTER -->
            <div class="header-title">
                <h1>Write a Review</h1>

                <div class="card review-form-card">
                    <form id="review-form">

                        <label>Department</label>
                        <input type="text" id="department" required>

                        <label>Course ID</label>
                        <input type="text" id="course_id" required>

                        <label>Instructor First Name</label>
                        <input type="text" id="instructor_first_name" required>

                        <label>Instructor Last Name</label>
                        <input type="text" id="instructor_last_name" required>

                        <label>Reviewer First Name</label>
                        <input type="text" id="reviewer_first_name" required>

                        <label>Reviewer Last Name</label>
                        <input type="text" id="reviewer_last_name" required>

                        <!-- documentation: https://www.w3schools.com/TAGS/att_input_type_date.asp -->
                        <label>Date</label>
                        <input type="date" id="creation_date" required>

                        <label>Written Review</label>
                        <textarea id="comment" maxlength="1000" required></textarea>

                        <button type="submit" class="write-review-btn">Submit Review</button>
                    </form>

                    <p id="review-message"></p>
                </div>
            </div>

            <!-- TOP RIGHT -->
            <div class="top-links">
                <div id="user-status"></div>
                <span>|</span>
                <a href="about.html">About</a>
                <img src="photos/user.png" alt="Default profile picture" class="contact-avatar">
            </div>

        </div>

        <!-- FOOTER -->
        <div class="footer">
            <a href="contact.html">Contact Us</a>
        </div>

    </div>

    <script defer src="loginStatus.js"></script>
    <script src="write-review.js"></script>

</body>
</html>
