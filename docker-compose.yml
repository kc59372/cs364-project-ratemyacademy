services:
  nginx:
    container_name: web
    image: nginx:alpine
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - mynetwork
    volumes:
      - ./nginx/frontend:/usr/share/nginx/html
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf

  backend:
    build: ./backend
    container_name: api
    ports:
      - "3000:3000"
    env_file:
      - .env  # Load environment variables
    volumes:
      - ./backend:/app
    depends_on:
      - db
    networks:
      - mynetwork

  db:
    image: postgres:latest
    container_name: db
    env_file:
      - .env  # load same environment variables
    volumes:
      - pgdata2:/var/lib/postgresql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - mynetwork

volumes:
  pgdata2:

networks:
  mynetwork:
